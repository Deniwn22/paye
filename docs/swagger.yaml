host: api.paye.africa
info:
  contact: {}
  description: |-
    Unified payment routing engine and secure webhook proxies for African developers.

    ![Paye Logo](/favicon_io/android-chrome-192x192.png)

    Production Server: https://api.paye.africa
    Local Server: http://localhost:8080

    ---
    **Testing Guide:**
    - **Safe to Test**: Endpoints under the Dashboard and Providers tags are safe to use for CRUD operations. Virtual accounts can be created with `type: static` safely.
    - **Use Caution**: Live Transaction initializations will redirect to actual payment gateways and may deduct funds if real card details are entered. Ensure you are using Test API Keys (`X-Paye-API-Key: paye_test_...`) when exploring transaction flows.
    - **Misdirected Payments**: These are auto-generated when webhooks fail to find a matching VA. You can list them and mark them as resolved safely.
    ---

    Authentication Modes:
    1. Bearer JWT Token: Passed as "Authorization: Bearer <token>". Scoped to Dashboard CRUD resources (projects, provider credentials, webhook routes, logs).
    2. API Key Header: Passed as "X-Paye-API-Key: paye_live_..." or "paye_test_...". Scoped to server-to-server transaction initializations, refunds, and payouts.
  title: Paye API
  version: "1.0"
paths:
  /dashboard/logs:
    get:
      description: Retrieve recent webhook proxy delivery log history (paginated)
      parameters:
      - description: 'Pagination limit (default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Pagination offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerWebhookLogListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: List dashboard proxy webhook logs
      tags:
      - Dashboard
  /dashboard/stats:
    get:
      description: Retrieve aggregated payment stats, including volumes, counts, and
        active providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerDashboardStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard statistics
      tags:
      - Dashboard
  /notifications:
    get:
      description: List all notifications for the authenticated project
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: List notifications
      tags:
      - Notifications
  /notifications/{id}:
    delete:
      description: Delete a specific notification by its ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a notification
      tags:
      - Notifications
  /notifications/{id}/read:
    post:
      description: Mark a specific notification as read by its ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Mark notification as read
      tags:
      - Notifications
  /notifications/read-all:
    post:
      description: Mark all unread notifications as read for the authenticated project
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Mark all notifications as read
      tags:
      - Notifications
  /notifications/stream:
    get:
      description: Connect to the Server-Sent Events stream for real-time notifications
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Stream notifications (SSE)
      tags:
      - Notifications
  /payment-providers:
    get:
      description: Retrieve a list of all payment providers from the system database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerPaymentProviderListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      summary: List supported payment providers
      tags:
      - Providers
  /payment-providers/{name}:
    put:
      consumes:
      - application/json
      description: Update metadata, notes, and test credentials of a payment provider
        (admin only)
      parameters:
      - description: Payment Provider Name
        in: path
        name: name
        required: true
        type: string
      - description: Payment Provider Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePaymentProviderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "455":
          description: ""
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Update payment provider details
      tags:
      - Providers
  /payment-providers/{name}/toggle-support:
    post:
      description: Toggle the global support status of a payment provider (admin only)
      parameters:
      - description: Payment Provider Name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Toggle payment provider support status
      tags:
      - Providers
  /projects:
    get:
      description: List all projects belonging to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: List user projects
      tags:
      - Projects
    post:
      consumes:
      - application/json
      description: Create a new project for the authenticated user
      parameters:
      - description: Project details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/projects.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
