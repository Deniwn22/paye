basePath: /api/v1
definitions:
  api.SwaggerDashboardStatsResponse:
    properties:
      data:
        $ref: '#/definitions/dto.DashboardStatsResponse'
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerPaymentProviderListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.PaymentProviderResponse'
        type: array
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerProviderConfigListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProviderConfigResponse'
        type: array
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerProviderConfigResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ProviderConfigResponse'
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerSimpleResponse:
    properties:
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerTransactionInitializeResponse:
    properties:
      data:
        $ref: '#/definitions/dto.InitializeTransactionResponse'
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerTransactionListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.VerifyTransactionResponse'
        type: array
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerTransactionVerifyResponse:
    properties:
      data:
        $ref: '#/definitions/dto.VerifyTransactionResponse'
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerWebhookConfigListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.WebhookConfigResponse'
        type: array
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerWebhookConfigResponse:
    properties:
      data:
        $ref: '#/definitions/dto.WebhookConfigResponse'
      message:
        type: string
      status:
        type: boolean
    type: object
  api.SwaggerWebhookLogListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.WebhookLogResponse'
        type: array
      message:
        type: string
      status:
        type: boolean
    type: object
  dto.CreateVirtualAccountDTO:
    properties:
      account_name:
        type: string
      bvn:
        type: string
      currency:
        type: string
      customer_reference:
        type: string
      expected_amount:
        description: dynamic only
        type: number
      expiry_date:
        description: dynamic only
        type: string
      type:
        description: '"static" | "dynamic", defaults to static'
        type: string
    required:
    - account_name
    - currency
    - customer_reference
    type: object
  dto.DashboardStatsResponse:
    properties:
      active_providers_count:
        type: integer
      failed_deliveries:
        type: integer
      failed_transactions:
        type: integer
      successful_deliveries:
        type: integer
      total_transactions:
        type: integer
      total_volume:
        type: number
    type: object
  dto.InitializeTransactionRequest:
    properties:
      amount:
        type: number
      callbackUrl:
        type: string
      currency:
        type: string
      email:
        type: string
      provider:
        type: string
      reference:
        type: string
    required:
    - amount
    - currency
    - email
    - provider
    type: object
  dto.InitializeTransactionResponse:
    properties:
      amount:
        type: number
      authorization_url:
        type: string
      currency:
        type: string
      message:
        type: string
      metadata:
        additionalProperties: true
        type: object
      provider:
        type: string
      reference:
        type: string
      status:
        description: pending, success, failed
        type: string
    type: object
  dto.PaymentProviderResponse:
    properties:
      description:
        type: string
      id:
        type: string
      is_supported:
        type: boolean
      label:
        type: string
      name:
        type: string
      notes:
        type: string
      test_credentials:
        type: string
    type: object
  dto.ProviderConfigRequest:
    properties:
      is_active:
        type: boolean
      label:
        type: string
      live_public_key:
        type: string
      live_secret_key:
        type: string
      live_webhook_secret:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider_name:
        $ref: '#/definitions/dto.ProviderType'
      public_key:
        description: legacy
        type: string
      secret_key:
        description: legacy
        type: string
      test_public_key:
        type: string
      test_secret_key:
        type: string
      test_webhook_secret:
        type: string
    required:
    - label
    - provider_name
    type: object
  dto.ProviderConfigResponse:
    properties:
      id:
        type: string
      is_active:
        type: boolean
      label:
        type: string
      live_public_key:
        type: string
      live_secret_key:
        type: string
      live_webhook_secret:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider_name:
        type: string
      public_key:
        description: legacy
        type: string
      secret_key:
        description: legacy
        type: string
      test_public_key:
        type: string
      test_secret_key:
        type: string
      test_webhook_secret:
        type: string
    type: object
  dto.ProviderType:
    enum:
    - paystack
    type: string
    x-enum-varnames:
    - Paystack
  dto.UpdatePaymentProviderRequest:
    properties:
      description:
        type: string
      is_supported:
        type: boolean
      notes:
        type: string
      test_credentials:
        type: string
    type: object
  dto.VerifyTransactionResponse:
    properties:
      amount:
        type: number
      currency:
        type: string
      message:
        type: string
      provider:
        type: string
      reference:
        type: string
      status:
        description: pending, success, failed
        type: string
    type: object
  dto.WebhookConfigRequest:
    properties:
      paye_webhook_slug:
        type: string
      provider_name:
        type: string
      target_url:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.WbhookType'
        description: '"payment" | "va" | "all", defaults to "payment"'
    required:
    - provider_name
    type: object
  dto.WebhookConfigResponse:
    properties:
      id:
        type: string
      paye_webhook_slug:
        type: string
      provider_name:
        type: string
      target_url:
        type: string
      type:
        $ref: '#/definitions/models.WbhookType'
    type: object
  dto.WebhookLogResponse:
    properties:
      amount:
        type: number
      created_at:
        type: string
      error_message:
        type: string
      event:
        type: string
      forwarded_status:
        type: integer
      id:
        type: string
      payload:
        type: string
      reference:
        type: string
      status:
        type: string
      webhook_config_id:
        type: string
    type: object
  models.WbhookType:
    enum:
    - va
    - payment
    - all
    type: string
    x-enum-varnames:
    - VA
    - PAYMENT
    - ALL
  projects.CreateProjectRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  sdk.CreateSDKSubscriptionRequest:
    properties:
      customerEmail:
        type: string
      planId:
        type: string
      publicId:
        type: string
      reference:
        type: string
    required:
    - customerEmail
    - planId
    - publicId
    - reference
    type: object
  sdk.InitializeSDKTransactionRequest:
    properties:
      amount:
        type: number
      callbackUrl:
        type: string
      currency:
        type: string
      email:
        type: string
      provider:
        type: string
      publicId:
        type: string
      reference:
        type: string
    required:
    - amount
    - email
    - publicId
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    Unified payment routing engine and secure webhook proxies for African developers.

    Production Server: https://paye.africa
    Local Server: http://localhost:8080

    Authentication Modes:
    1. Bearer JWT Token: Passed as "Authorization: Bearer <token>". Scoped to Dashboard CRUD resources (projects, provider credentials, webhook routes, logs).
    2. API Key Header: Passed as "X-Paye-API-Key: paye_live_...". Scoped to server-to-server transaction initializations, refunds, and payouts.
  title: Paye API
  version: "1.0"
paths:
  /dashboard/logs:
    get:
      description: Retrieve recent webhook proxy delivery log history (paginated)
      parameters:
      - description: 'Pagination limit (default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Pagination offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerWebhookLogListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: List dashboard proxy webhook logs
      tags:
      - Dashboard
  /dashboard/stats:
    get:
      description: Retrieve aggregated payment stats, including volumes, counts, and
        active providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerDashboardStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard statistics
      tags:
      - Dashboard
  /notifications:
    get:
      description: List all notifications for the authenticated project
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: List notifications
      tags:
      - Notifications
  /notifications/{id}:
    delete:
      description: Delete a specific notification by its ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a notification
      tags:
      - Notifications
  /notifications/{id}/read:
    post:
      description: Mark a specific notification as read by its ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Mark notification as read
      tags:
      - Notifications
  /notifications/read-all:
    post:
      description: Mark all unread notifications as read for the authenticated project
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Mark all notifications as read
      tags:
      - Notifications
  /notifications/stream:
    get:
      description: Connect to the Server-Sent Events stream for real-time notifications
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Stream notifications (SSE)
      tags:
      - Notifications
  /payment-providers:
    get:
      description: Retrieve a list of all payment providers from the system database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerPaymentProviderListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      summary: List supported payment providers
      tags:
      - Providers
  /payment-providers/{name}:
    put:
      consumes:
      - application/json
      description: Update metadata, notes, and test credentials of a payment provider
        (admin only)
      parameters:
      - description: Payment Provider Name
        in: path
        name: name
        required: true
        type: string
      - description: Payment Provider Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePaymentProviderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "455":
          description: ""
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Update payment provider details
      tags:
      - Providers
  /payment-providers/{name}/toggle-support:
    post:
      description: Toggle the global support status of a payment provider (admin only)
      parameters:
      - description: Payment Provider Name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Toggle payment provider support status
      tags:
      - Providers
  /projects:
    get:
      description: List all projects belonging to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: List user projects
      tags:
      - Projects
    post:
      consumes:
      - application/json
      description: Create a new project for the authenticated user
      parameters:
      - description: Project details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/projects.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new project
      tags:
      - Projects
  /projects/{id}:
    delete:
      description: Delete a specific project by its ID
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a project
      tags:
      - Projects
    get:
      description: Get details of a specific project by its ID
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - ApiKeyAuth: []
      summary: Get project details
      tags:
      - Projects
  /providers:
    get:
      description: Retrieve list of all provider configs for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerProviderConfigListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: List provider configurations
      tags:
      - Providers
    post:
      consumes:
      - application/json
      description: Create a provider configuration for the authenticated user
      parameters:
      - description: Provider Configuration Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ProviderConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerProviderConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Register provider configuration
      tags:
      - Providers
  /providers/{id}:
    delete:
      description: Remove a specific provider config
      parameters:
      - description: Provider Config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Delete provider configuration
      tags:
      - Providers
    put:
      consumes:
      - application/json
      description: Update fields of a specific provider config
      parameters:
      - description: Provider Config ID
        in: path
        name: id
        required: true
        type: string
      - description: Provider Config Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ProviderConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerProviderConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Update provider configuration
      tags:
      - Providers
  /providers/{id}/toggle:
    patch:
      description: Enable or disable a specific provider configuration
      parameters:
      - description: Provider Config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
      security:
      - BearerAuth: []
      summary: Toggle provider active status
      tags:
      - Providers
  /sdk/{publicId}:
    get:
      description: Serve the Javascript SDK file customized for the merchant's active
        providers and keys
      parameters:
      - description: Merchant or Project Public ID (ends with .js)
        in: path
        name: publicId
        required: true
        type: string
      produces:
      - application/javascript
      responses:
        "200":
          description: JavaScript SDK Source
          schema:
            type: string
        "400":
          description: Missing or invalid Public ID
          schema:
            type: string
        "404":
          description: Project not found
          schema:
            type: string
      summary: Serve dynamic Paye SDK script
      tags:
      - SDK
  /sdk/subscriptions:
    post:
      consumes:
      - application/json
      description: Initialize a subscription from the client SDK using a project's
        Public ID
      parameters:
      - description: Subscription details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sdk.CreateSDKSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SwaggerSimpleResponse'
